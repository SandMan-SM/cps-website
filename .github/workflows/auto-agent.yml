name: Auto-Agent

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  auto-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm install -g @anthropic-ai/claude-code
      - run: |
          git config --global user.email "agent@omni-ai.com"
          git config --global user.name "Omni Auto-Agent"
      - name: Run Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd ..
          claude --print --dangerously-skip-permissions             "Read CLAUDE.md. Complete all Agent Priorities. Run 'npm run build' to verify. Commit with prefix 'agent:'. Never touch .env files. NEVER use framer-motion or animation libraries. NEVER use Tailwind built-in colors."
      - run: git push origin HEAD || echo "No changes to push"
